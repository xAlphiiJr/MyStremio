name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install Stremio Desktop (runtime binaries)
        run: |
          choco install stremio -y
          if (-not (Test-Path "$env:LOCALAPPDATA\Programs\Stremio\stremio-runtime.exe")) {
            throw "Stremio runtime not found after install"
          }

      - name: Build and package
        shell: pwsh
        run: |
          cd stremio-shell/stremio-shell-ng-main
          ./package-release.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/MyStremioSetup-v*_x64.exe
            release/SHA256SUMS.txt
          generate_release_notes: true
